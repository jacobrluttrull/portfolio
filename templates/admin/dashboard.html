{% extends "base.html" %}

{% block title %}Admin Dashboard | Portfolio{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <h1 class="page-title">Admin <span class="accent">Dashboard</span></h1>
        <a href="/admin/logout" style="color: var(--text-muted); float: right;">Logout</a>

        <a href="/admin/add" class="btn-outline-accent" style="margin-bottom: 2rem; display: inline-block;">Add Project</a>

        <table style="width: 100%; border-collapse: collapse; margin-top: 1rem;">
            <thead>
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left;">
                    <th style="padding: 0.75rem; color: var(--text-muted);">ID</th>
                    <th style="padding: 0.75rem; color: var(--text-muted);">Title</th>
                    <th style="padding: 0.75rem; color: var(--text-muted);">Order</th>
                    <th style="padding: 0.75rem; color: var(--text-muted);">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for project in projects %}
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <td style="padding: 0.75rem;">{{ project.id }}</td>
                    <td style="padding: 0.75rem;">{{ project.title }}</td>
                    <td style="padding: 0.75rem;">{{ project.display_order }}</td>
                    <td style="padding: 0.75rem;">
                        <a href="/admin/edit/{{ project.id }}" style="color: var(--accent); margin-right: 1rem;">Edit</a>
                        <form action="/admin/delete/{{ project.id }}" method="post" style="display: inline;">
                            <button type="submit" style="background: none; border: none; color: var(--text-muted); cursor: pointer;">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
