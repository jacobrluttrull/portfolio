{% extends "base.html" %}

{% block title %}Admin Dashboard | Portfolio{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <h1 class="page-title">Admin <span class="accent">Dashboard</span></h1>
        <a href="/admin/logout" class="admin-logout">Logout</a>

        <a href="/admin/add" class="btn-outline-accent admin-add-btn">Add Project</a>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for project in projects %}
                <tr>
                    <td>{{ project.id }}</td>
                    <td>{{ project.title }}</td>
                    <td>{{ project.display_order }}</td>
                    <td>
                        <a href="/admin/edit/{{ project.id }}" class="admin-action-edit">Edit</a>
                        <form action="/admin/delete/{{ project.id }}" method="post" class="admin-delete-form">
                            <button type="submit" class="admin-action-delete">Delete</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
