{% extends "base.html" %}

{% block title %}Edit Project | Portfolio{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <h1 class="page-title">Edit <span class="accent">Project</span></h1>

        <form class="contact-form" action="/admin/edit/{{ project.id }}" method="post">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ project.title }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required>{{ project.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="tech_stack">Tech Stack</label>
                <input type="text" id="tech_stack" name="tech_stack" value="{{ project.tech_stack }}" required>
            </div>

            <div class="form-group">
                <label for="github_link">GitHub Link</label>
                <input type="text" id="github_link" name="github_link" value="{{ project.github_link }}" required>
            </div>

            <div class="form-group">
                <label for="image_url">Image URL (optional)</label>
                <input type="text" id="image_url" name="image_url" value="{{ project.image_url or '' }}">
            </div>

            <div class="form-group">
                <label for="duration">Duration</label>
                <input type="text" id="duration" name="duration" value="{{ project.duration }}" required>
            </div>

            <div class="form-group">
                <label for="display_order">Display Order</label>
                <input type="number" id="display_order" name="display_order" value="{{ project.display_order }}" required>
            </div>

            <button type="submit" class="btn-outline-accent">Update Project</button>
            <a href="/admin" style="color: var(--text-muted); margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
