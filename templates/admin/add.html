{% extends "base.html" %}

{% block title %}Add Project | Portfolio{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <h1 class="page-title">Add <span class="accent">Project</span></h1>

        <form class="contact-form" action="/admin/add" method="post">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="tech_stack">Tech Stack</label>
                <input type="text" id="tech_stack" name="tech_stack" required>
            </div>

            <div class="form-group">
                <label for="github_link">GitHub Link</label>
                <input type="text" id="github_link" name="github_link" required>
            </div>

            <div class="form-group">
                <label for="image_url">Image URL (optional)</label>
                <input type="text" id="image_url" name="image_url">
            </div>

            <div class="form-group">
                <label for="duration">Duration</label>
                <input type="text" id="duration" name="duration" required>
            </div>

            <div class="form-group">
                <label for="display_order">Display Order</label>
                <input type="number" id="display_order" name="display_order" required>
            </div>

            <button type="submit" class="btn-outline-accent">Add Project</button>
            <a href="/admin" style="color: var(--text-muted); margin-left: 1rem;">Cancel</a>
        </form>
    </div>
</section>
{% endblock %}
