{% extends "base.html" %}

{% block title %}Contact | Portfolio{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container">
        <h1 class="page-title">Contact <span class="accent">Me</span></h1>

        {% if success %}
        <div class="success-message">
            <p>Message sent successfully! I'll get back to you soon.</p>
        </div>
        {% endif %}

        {% if errors %}
        <div class="error-message">
            {% for error in errors %}
            <p>{{ error }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form class="contact-form" action="/contact" method="post">
            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" value="{{ name or '' }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" required>
            </div>

            <div class="form-group">
                <label for="phone_number">Phone (optional)</label>
                <input type="tel" id="phone_number" name="phone_number" value="{{ phone_number or '' }}">
            </div>

            <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="6" required>{{ message or '' }}</textarea>
            </div>

            <button type="submit" class="btn-outline-accent">Send Message</button>
        </form>
    </div>
</section>
{% endblock %}
